<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950" role="img" aria-labelledby="title desc">
  <title id="title">Mohács vasútállomás térképe</title>
  <desc id="desc">Egyszerű állomástérkép a mohácsi vasútállomás főbb pontjaival.</desc>
  <defs>
    <style>
      .header{fill:#26366f}
      .bg{fill:#f7f7f1}
      .road{fill:#f1c29f;stroke:#d7a37e;stroke-width:3}
      .platform{fill:#fff7cf;stroke:#d4c680;stroke-width:3}
      .building{fill:#b8bdc5;stroke:#868c95;stroke-width:3}
      .rail{stroke:#1e1e1e;stroke-width:7;fill:none;stroke-linecap:round}
      .label{font-family:Arial,Helvetica,sans-serif;fill:#25325f}
      .small{font-size:26px}
      .medium{font-size:36px;font-weight:700}
      .large{font-size:58px;font-weight:700;fill:white}
      .white{fill:white}
      .iconBox{fill:#26366f;stroke:white;stroke-width:4;rx:8}
      .legend{fill:white;stroke:#d7d7d7;stroke-width:2;rx:10}
      .legendText{font-family:Arial,Helvetica,sans-serif;font-size:24px;fill:#1f1f1f}
      .trackNo{fill:white;stroke:#333;stroke-width:3;rx:5}
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="950"/>
  <rect class="header" x="0" y="0" width="1600" height="108"/>
  <rect x="30" y="27" width="58" height="58" rx="8" fill="none" stroke="white" stroke-width="4"/>
  <text x="118" y="72" class="large">Mohács</text>
  <text x="49" y="66" font-family="Arial,Helvetica,sans-serif" font-size="42" fill="white">i</text>

  <rect class="road" x="0" y="710" width="1600" height="92"/>
  <text x="220" y="774" class="label small" transform="rotate(-2 220 774)">Indóház utca</text>
  <rect class="road" x="960" y="108" width="92" height="842"/>
  <text x="1008" y="478" class="label small" transform="rotate(90 1008 478)">állomási gyalogos kapcsolat</text>

  <rect class="building" x="330" y="545" width="430" height="150"/>
  <text x="390" y="628" class="label medium">állomásépület</text>

  <rect class="platform" x="185" y="438" width="1200" height="70"/>
  <rect class="platform" x="720" y="326" width="790" height="60"/>
  <path class="rail" d="M50 416 C360 420 575 417 775 408 C1030 397 1280 392 1550 396"/>
  <path class="rail" d="M40 520 C370 522 650 520 890 510 C1120 502 1330 500 1560 504"/>
  <path class="rail" d="M100 605 C470 600 730 594 940 586 C1180 577 1370 573 1570 574"/>

  <rect class="trackNo" x="785" y="394" width="44" height="44"/>
  <text x="799" y="426" font-family="Arial,Helvetica,sans-serif" font-size="32">1</text>
  <rect class="trackNo" x="1115" y="493" width="44" height="44"/>
  <text x="1129" y="525" font-family="Arial,Helvetica,sans-serif" font-size="32">2</text>
  <text x="1165" y="366" class="label small">Pécs, Villány irány</text>
  <text x="120" y="396" class="label small">állomási vágányok</text>

  <rect class="legend" x="55" y="145" width="360" height="475"/>
  <text x="82" y="194" class="legendText" style="font-weight:700;font-size:30px">Jelmagyarázat / Legend</text>

  <rect class="iconBox" x="86" y="232" width="44" height="44"/>
  <text x="101" y="264" font-family="Arial,Helvetica,sans-serif" font-size="30" fill="white">i</text>
  <text x="150" y="262" class="legendText">információ / information</text>

  <rect class="iconBox" x="86" y="292" width="44" height="44"/>
  <text x="95" y="323" font-family="Arial,Helvetica,sans-serif" font-size="27" fill="white">J</text>
  <text x="150" y="322" class="legendText">jegypénztár / ticket office</text>

  <rect class="iconBox" x="86" y="352" width="44" height="44"/>
  <text x="95" y="383" font-family="Arial,Helvetica,sans-serif" font-size="24" fill="white">WC</text>
  <text x="150" y="382" class="legendText">mosdó / toilet</text>

  <rect class="iconBox" x="86" y="412" width="44" height="44"/>
  <text x="98" y="444" font-family="Arial,Helvetica,sans-serif" font-size="27" fill="white">P</text>
  <text x="150" y="442" class="legendText">parkoló / car park</text>

  <rect class="iconBox" x="86" y="472" width="44" height="44"/>
  <text x="94" y="503" font-family="Arial,Helvetica,sans-serif" font-size="25" fill="white">🚲</text>
  <text x="150" y="502" class="legendText">kerékpártároló / bicycle parking</text>

  <rect class="iconBox" x="86" y="532" width="44" height="44"/>
  <text x="95" y="562" font-family="Arial,Helvetica,sans-serif" font-size="27" fill="white">🚉</text>
  <text x="150" y="562" class="legendText">vasútállomás / railway station</text>

  <rect class="iconBox" x="780" y="557" width="50" height="50"/>
  <text x="796" y="592" font-family="Arial,Helvetica,sans-serif" font-size="33" fill="white">i</text>
  <rect class="iconBox" x="840" y="557" width="50" height="50"/>
  <text x="851" y="591" font-family="Arial,Helvetica,sans-serif" font-size="31" fill="white">J</text>
  <rect class="iconBox" x="900" y="557" width="50" height="50"/>
  <text x="909" y="590" font-family="Arial,Helvetica,sans-serif" font-size="25" fill="white">WC</text>
  <rect class="iconBox" x="780" y="618" width="50" height="50"/>
  <text x="793" y="652" font-family="Arial,Helvetica,sans-serif" font-size="31" fill="white">P</text>
  <rect class="iconBox" x="840" y="618" width="50" height="50"/>
  <text x="848" y="651" font-family="Arial,Helvetica,sans-serif" font-size="27" fill="white">🚲</text>

  <rect class="iconBox" x="1080" y="676" width="54" height="54"/>
  <text x="1094" y="713" font-family="Arial,Helvetica,sans-serif" font-size="34" fill="white">P</text>
  <text x="1145" y="713" class="label small">parkoló</text>

  <rect class="iconBox" x="660" y="452" width="54" height="54"/>
  <text x="676" y="489" font-family="Arial,Helvetica,sans-serif" font-size="34" fill="white">🚉</text>
  <text x="720" y="492" class="label medium">Mohács</text>

  <text x="495" y="850" class="label small">A térkép tájékoztató jellegű, a fő utasforgalmi pontokat mutatja.</text>
  <rect x="28" y="900" width="190" height="32" rx="4" fill="#26366f"/>
  <text x="42" y="924" font-family="Arial,Helvetica,sans-serif" font-size="20" fill="white" font-weight="700">Okosállomás</text>
</svg>
